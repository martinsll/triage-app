<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triage Training</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:16px;border:0.5px solid #e0ddd5;padding:40px;max-width:480px;width:100%}
  h1{font-size:22px;font-weight:500;color:#1a1a1a;margin-bottom:4px}
  .sub{font-size:13px;color:#888;margin-bottom:32px}
  .field{margin-bottom:20px}
  label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:6px;letter-spacing:0.3px;text-transform:uppercase}
  input[type=text]{width:100%;padding:10px 12px;border:0.5px solid #d0cdc5;border-radius:8px;font-size:14px;outline:none;transition:border-color 0.15s}
  input[type=text]:focus{border-color:#378ADD}
  .pills{display:flex;gap:8px;flex-wrap:wrap}
  .pill{padding:6px 14px;border-radius:6px;border:0.5px solid #d0cdc5;background:#fff;font-size:13px;cursor:pointer;transition:all 0.15s;color:#555}
  .pill.active{background:#378ADD;border-color:#378ADD;color:#fff}
  .pill:hover:not(.active){border-color:#888}
  .start-btn{width:100%;padding:12px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:14px;font-weight:500;cursor:pointer;margin-top:8px;transition:opacity 0.15s}
  .start-btn:hover{opacity:0.85}
  .divider{border:none;border-top:0.5px solid #e0ddd5;margin:24px 0}
  .admin-link{text-align:center;font-size:12px;color:#aaa;margin-top:16px}
  .admin-link a{color:#888;text-decoration:none}
  .admin-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <h1>Triage Training</h1>
  <p class="sub">Configure the session before starting</p>

  <div class="field">
    <label>Name</label>
    <input type="text" id="pid" placeholder="e.g. Maria Garcia" autocomplete="off"/>
  </div>

  <div class="field">
    <label>Patient set</label>
    <div class="pills" id="set-pills">
      <div class="pill active" data-val="A">Set A</div>
      <div class="pill" data-val="B">Set B</div>
    </div>
  </div>

  <div class="field">
    <label>Groups to play</label>
    <div class="pills" id="group-pills">
      <div class="pill active" data-val="1">Group 1</div>
      <div class="pill active" data-val="2">Group 2</div>
      <div class="pill active" data-val="3">Group 3</div>
    </div>
    <p style="font-size:11px;color:#aaa;margin-top:6px">Click to toggle — selected groups will be played in order</p>
  </div>

  <div class="field">
    <label>Language</label>
    <div class="pills" id="lang-pills">
      <div class="pill active" data-val="en">English</div>
      <div class="pill" data-val="es">Español</div>
    </div>
  </div>

  <hr class="divider"/>
  <button class="start-btn" onclick="startSession()">Start session →</button>

  <div class="admin-link">
    <a href="/admin">Experimenter view ↗</a>
  </div>
</div>

<script>
  function setupPills(containerId, multi=false){
    const c=document.getElementById(containerId);
    c.querySelectorAll('.pill').forEach(p=>{
      p.addEventListener('click',()=>{
        if(!multi){
          c.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
          p.classList.add('active');
        } else {
          p.classList.toggle('active');
          if(c.querySelectorAll('.pill.active').length===0)p.classList.add('active');
        }
      });
    });
  }
  setupPills('set-pills',false);
  setupPills('group-pills',true);
  setupPills('lang-pills',false);

  function getActive(containerId){
    return [...document.getElementById(containerId).querySelectorAll('.pill.active')]
      .map(p=>p.dataset.val);
  }

  async function startSession(){
    const pid=document.getElementById('pid').value.trim();
    if(!pid){document.getElementById('pid').focus();document.getElementById('pid').style.borderColor='#E24B4A';return;}
    const set=getActive('set-pills')[0];
    const groups=getActive('group-pills').map(Number);
    const lang=getActive('lang-pills')[0];
    const res=await fetch('/api/start',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({participant_id:pid,set,groups,language:lang})});
    const data=await res.json();
    if(data.ok) window.location.href='/onboarding';
  }
</script>
</body>
</html>
