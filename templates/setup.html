<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triage Training</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:16px;border:0.5px solid #e0ddd5;padding:40px;max-width:420px;width:100%}
  h1{font-size:22px;font-weight:500;color:#1a1a1a;margin-bottom:4px}
  .sub{font-size:13px;color:#888;margin-bottom:32px;line-height:1.5}
  .field{margin-bottom:24px}
  label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:6px;letter-spacing:0.3px;text-transform:uppercase}
  input[type=text]{width:100%;padding:12px 14px;border:0.5px solid #d0cdc5;border-radius:8px;font-size:15px;outline:none;transition:border-color 0.15s}
  input[type=text]:focus{border-color:#378ADD}
  input[type=text]::placeholder{color:#bbb}
  .start-btn{width:100%;padding:14px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:15px;font-weight:500;cursor:pointer;transition:opacity 0.15s;margin-top:4px}
  .start-btn:hover{opacity:0.85}
  .admin-link{text-align:center;font-size:12px;color:#aaa;margin-top:20px}
  .admin-link a{color:#888;text-decoration:none}
  .admin-link a:hover{text-decoration:underline}
  .err{border-color:#E24B4A !important}
</style>
</head>
<body>
<div class="card">
  <h1>Triage Training</h1>
  <p class="sub">Enter your name to begin the experiment.</p>

  <div class="id-box">
    <div class="id-label">Your participant ID / Su ID de participante</div>
    <div class="id-value">{{ participant_id }}</div>
    <div class="id-note">Please note this ID before continuing. / Anote este ID antes de continuar.</div>
  </div>


  <button class="start-btn" onclick="startSession()">Start →</button>

  <div class="admin-link">
    <a href="/admin">Experimenter view ↗</a>
  </div>
</div>

<script>
document.getElementById('pid').addEventListener('keydown', e => {
  if(e.key === 'Enter') startSession();
});

async function startSession(){
  const pid = document.getElementById('pid').value.trim();
  if(!pid){
    document.getElementById('pid').classList.add('err');
    document.getElementById('pid').focus();
    return;
  }
  document.getElementById('pid').classList.remove('err');
  const res = await fetch('/api/start', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({participant_id: pid, language: 'en'})
  });
  const data = await res.json();
  if(data.ok) window.location.href = data.redirect;
}
</script>
</body>
</html>
